safety:
  mode: dry_run
  allow_control: false

camera:
  host: 192.168.123.164
  port: 5555
  timeout_s: 10.0
  protocol: lab-g1-rgbd-v1

robot_state:
  ssh_host: g1_bjutech
  sonic_root: /home/unitree/data_collection/GR00T-WholeBodyControl
  remote_reader: /home/unitree/data_collection/sim_data_collect/outputs/real_robot_tools/g1_read_lowstate
  network_interface: eth0
  timeout_s: 3.0
  max_abs_dq_rad_s: 1.0

initialization:
  profile: sonicmj
  fps: 50
  duration_s: 3.0
  max_joint_speed_rad_s: 0.35
  max_measured_speed_rad_s: 0.20

camera_geometry:
  # 使用 NVIDIA GR00T-WholeBodyControl 官方 G1 MJCF 的腰部链和 head_camera
  # 固定位姿；T_pelvis_camera 会随 LowState 的 yaw/roll/pitch 在线计算。
  model: official_g1_mjcf
  source: https://github.com/NVlabs/GR00T-WholeBodyControl/blob/main/gear_sonic/data/robot_model/model_data/g1/g1_29dof_with_hand.xml

task:
  object_name: bottle
  pregrasp_offset_m: 0.03
  lift_offset_base_m: [0.0, 0.0, 0.10]

planner:
  episode_index: 0
  hug_sampling_steps: 5
  hug_candidates: 8
  fps: 30
  duration_s: 6.0
  # current->pregrasp, pregrasp->grasp, close, lift
  phase_ratios: [0.45, 0.20, 0.15, 0.20]
  max_arm_speed_rad_s: 0.35
